<svg viewBox="0 0 420 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="420" height="200" fill="#0d1b3e"/>
  <!-- subtle grid -->
  <line x1="0" y1="50" x2="420" y2="50" stroke="#1e3a6e" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="100" x2="420" y2="100" stroke="#1e3a6e" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="150" x2="420" y2="150" stroke="#1e3a6e" stroke-width="0.5" opacity="0.5"/>
  <line x1="105" y1="0" x2="105" y2="200" stroke="#1e3a6e" stroke-width="0.5" opacity="0.5"/>
  <line x1="210" y1="0" x2="210" y2="200" stroke="#1e3a6e" stroke-width="0.5" opacity="0.5"/>
  <line x1="315" y1="0" x2="315" y2="200" stroke="#1e3a6e" stroke-width="0.5" opacity="0.5"/>
  <!-- wrench icon, centered left -->
  <g transform="translate(95,100) rotate(-35)">
    <!-- wrench body -->
    <rect x="-6" y="-50" width="12" height="65" rx="3" fill="#4a7cc7" opacity="0.85"/>
    <!-- wrench head -->
    <circle cx="0" cy="-52" r="18" fill="none" stroke="#4a7cc7" stroke-width="8" opacity="0.85"/>
    <circle cx="0" cy="-52" r="8" fill="#0d1b3e"/>
    <!-- wrench tail -->
    <rect x="-8" y="13" width="16" height="14" rx="3" fill="#4a7cc7" opacity="0.85"/>
  </g>
  <!-- diagnostic check marks / symptom list -->
  <g transform="translate(175, 30)">
    <!-- title -->
    <text x="110" y="18" font-family="Arial" font-size="15" fill="white" text-anchor="middle" font-weight="900" opacity="0.95">SEPTIC REPAIRS</text>
    <text x="110" y="34" font-family="Arial" font-size="9" fill="#6b9ed4" text-anchor="middle">Whatever is wrong — we fix it</text>
    <line x1="20" y1="44" x2="200" y2="44" stroke="#1e3a6e" stroke-width="1"/>
    <!-- symptom rows -->
    <g transform="translate(20,56)">
      <circle cx="8" cy="8" r="8" fill="#d81f2a" opacity="0.9"/>
      <text x="8" y="12" font-family="Arial" font-size="9" fill="white" text-anchor="middle" font-weight="bold">!</text>
      <text x="22" y="12" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.85)" font-weight="600">Slow drains &amp; backups</text>
    </g>
    <g transform="translate(20,80)">
      <circle cx="8" cy="8" r="8" fill="#d81f2a" opacity="0.9"/>
      <text x="8" y="12" font-family="Arial" font-size="9" fill="white" text-anchor="middle" font-weight="bold">!</text>
      <text x="22" y="12" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.85)" font-weight="600">Sewage odors</text>
    </g>
    <g transform="translate(20,104)">
      <circle cx="8" cy="8" r="8" fill="#d81f2a" opacity="0.9"/>
      <text x="8" y="12" font-family="Arial" font-size="9" fill="white" text-anchor="middle" font-weight="bold">!</text>
      <text x="22" y="12" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.85)" font-weight="600">Flooded or soggy yard</text>
    </g>
    <g transform="translate(20,128)">
      <circle cx="8" cy="8" r="8" fill="#d81f2a" opacity="0.9"/>
      <text x="8" y="12" font-family="Arial" font-size="9" fill="white" text-anchor="middle" font-weight="bold">!</text>
      <text x="22" y="12" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.85)" font-weight="600">Gurgling pipes</text>
    </g>
    <!-- bottom label -->
    <rect x="20" y="154" width="180" height="24" rx="12" fill="#162654" stroke="#4a7cc7" stroke-width="1"/>
    <text x="110" y="170" font-family="Arial" font-size="10" fill="#6b9ed4" text-anchor="middle" font-weight="700">All system types · All problems</text>
  </g>
</svg>