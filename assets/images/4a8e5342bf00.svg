<svg viewBox="0 0 420 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="420" height="200" fill="#0d1b3e"/>
  <!-- ground line -->
  <rect x="0" y="110" width="420" height="90" fill="#0a1428"/>
  <!-- grass texture -->
  <rect x="0" y="108" width="420" height="6" fill="#166534" opacity="0.7"/>
  <!-- sky -->
  <circle cx="370" cy="40" r="22" fill="#1e3a6e" opacity="0.5"/>
  <circle cx="50" cy="55" r="14" fill="#1e3a6e" opacity="0.4"/>
  <!-- house outline -->
  <polygon points="160,90 200,60 240,90" fill="none" stroke="#4a7cc7" stroke-width="2" opacity="0.6"/>
  <rect x="165" y="90" width="70" height="20" fill="none" stroke="#4a7cc7" stroke-width="2" opacity="0.6"/>
  <!-- septic tank underground -->
  <rect x="60" y="125" width="100" height="55" rx="8" fill="#162654" stroke="#d81f2a" stroke-width="2"/>
  <text x="110" y="148" font-family="Arial" font-size="9" fill="#6b9ed4" text-anchor="middle" font-weight="bold">SEPTIC</text>
  <text x="110" y="161" font-family="Arial" font-size="9" fill="#6b9ed4" text-anchor="middle" font-weight="bold">TANK</text>
  <!-- inlet/outlet pipes -->
  <rect x="155" y="143" width="30" height="6" rx="3" fill="#d81f2a" opacity="0.8"/>
  <rect x="25" y="143" width="40" height="6" rx="3" fill="#4a7cc7" opacity="0.8"/>
  <!-- drain field lines -->
  <line x1="185" y1="146" x2="185" y2="160" stroke="#d81f2a" stroke-width="2" opacity="0.7"/>
  <rect x="185" y="160" width="160" height="5" rx="2" fill="#d81f2a" opacity="0.5"/>
  <!-- drain field pipes with holes -->
  <line x1="205" y1="165" x2="205" y2="185" stroke="#d81f2a" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,4"/>
  <line x1="245" y1="165" x2="245" y2="185" stroke="#d81f2a" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,4"/>
  <line x1="285" y1="165" x2="285" y2="185" stroke="#d81f2a" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,4"/>
  <line x1="325" y1="165" x2="325" y2="185" stroke="#d81f2a" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,4"/>
  <!-- pipe from house to tank -->
  <line x1="185" y1="95" x2="185" y2="115" stroke="#4a7cc7" stroke-width="3" opacity="0.5"/>
  <line x1="25" y1="95" x2="25" y2="118" stroke="#4a7cc7" stroke-width="3" opacity="0.5"/>
  <line x1="25" y1="118" x2="65" y2="118" stroke="#4a7cc7" stroke-width="3" opacity="0.5"/>
  <line x1="65" y1="118" x2="65" y2="128" stroke="#4a7cc7" stroke-width="3" opacity="0.5"/>
  <!-- NEW badge -->
  <rect x="250" y="120" width="80" height="26" rx="13" fill="#d81f2a"/>
  <text x="290" y="137" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">NEW SYSTEM</text>
  <!-- label -->
  <text x="210" y="30" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold" opacity="0.9">SEPTIC SYSTEM REPLACEMENT</text>
  <text x="210" y="48" font-family="Arial" font-size="10" fill="#6b9ed4" text-anchor="middle">Full drain field · Tank · Permits · Inspection</text>
</svg>