  <rect x="24" y="36" width="18" height="2.5" rx="1" fill="#162654"/>
  <rect x="26" y="33" width="2" height="5" rx="0.5" fill="#0d1b3e"/>
  <rect x="31" y="33" width="2" height="5" rx="0.5" fill="#0d1b3e"/>
  <rect x="36" y="33" width="2" height="5" rx="0.5" fill="#0d1b3e"/>
  <!-- Pipe from house to tank -->
