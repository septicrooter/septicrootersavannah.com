<svg viewBox="0 0 420 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="420" height="200" fill="#0d1b3e"/>
  <!-- clipboard / report background -->
  <rect x="60" y="20" width="130" height="165" rx="8" fill="#111827" stroke="#334" stroke-width="1.5"/>
  <rect x="60" y="20" width="130" height="12" rx="8" fill="#1f2937"/>
  <rect x="60" y="26" width="130" height="6" fill="#1f2937"/>
  <!-- clipboard clip -->
  <rect x="108" y="14" width="34" height="16" rx="4" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <rect x="116" y="18" width="18" height="8" rx="2" fill="#1f2937"/>
  <!-- report lines / checklist -->
  <text x="125" y="52" font-family="Arial" font-size="8" fill="#6b7280" text-anchor="middle" font-weight="bold">INSPECTION REPORT</text>
  <line x1="74" y1="58" x2="176" y2="58" stroke="#1f2937" stroke-width="1"/>
  <!-- check items -->
  <g transform="translate(74,66)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#166534"/>
    <text x="5" y="8" font-family="Arial" font-size="7" fill="white" text-anchor="middle">✓</text>
    <text x="16" y="9" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.75)">Septic tank</text>
  </g>
  <g transform="translate(74,84)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#166534"/>
    <text x="5" y="8" font-family="Arial" font-size="7" fill="white" text-anchor="middle">✓</text>
    <text x="16" y="9" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.75)">Drain field</text>
  </g>
  <g transform="translate(74,102)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#166534"/>
    <text x="5" y="8" font-family="Arial" font-size="7" fill="white" text-anchor="middle">✓</text>
    <text x="16" y="9" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.75)">Pump &amp; panel</text>
  </g>
  <g transform="translate(74,120)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#166534"/>
    <text x="5" y="8" font-family="Arial" font-size="7" fill="white" text-anchor="middle">✓</text>
    <text x="16" y="9" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.75)">System components</text>
  </g>
  <g transform="translate(74,138)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#166534"/>
    <text x="5" y="8" font-family="Arial" font-size="7" fill="white" text-anchor="middle">✓</text>
    <text x="16" y="9" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.75)">Written report</text>
  </g>
  <!-- signature line -->
  <line x1="74" y1="168" x2="155" y2="168" stroke="#334" stroke-width="1"/>
  <text x="74" y="178" font-family="Arial" font-size="7" fill="#4b5563">Licensed Inspector · GA Certified</text>
  <!-- right side big price -->
  <text x="300" y="70" font-family="Arial" font-size="13" fill="#d97706" text-anchor="middle" font-weight="700">FLAT RATE</text>
  <text x="300" y="118" font-family="Arial" font-size="58" fill="white" text-anchor="middle" font-weight="900">$299</text>
  <line x1="232" y1="130" x2="368" y2="130" stroke="#374151" stroke-width="1"/>
  <text x="300" y="148" font-family="Arial" font-size="10" fill="#9ca3af" text-anchor="middle">Homebuyer Septic Inspection</text>
  <text x="300" y="163" font-family="Arial" font-size="9" fill="#6b7280" text-anchor="middle">Know before you close</text>
  <!-- house icon small -->
  <polygon points="270,38 300,18 330,38" fill="none" stroke="#d97706" stroke-width="2" opacity="0.7"/>
  <rect x="278" y="38" width="44" height="26" fill="none" stroke="#d97706" stroke-width="2" opacity="0.7"/>
  <rect x="290" y="48" width="20" height="16" fill="#d97706" opacity="0.2"/>
