<svg viewBox="0 0 420 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2200" stop-opacity="1"/>
      <stop offset="40%" stop-color="#d81f2a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d81f2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="35%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#3a0808" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080c18" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect width="420" height="200" fill="url(#bgGlow)"/>
  <!-- ambient red glow from alarm light -->
  <circle cx="148" cy="62" r="90" fill="url(#redGlow)" opacity="0.25"/>
  <!-- control panel box -->
  <rect x="60" y="30" width="175" height="145" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <rect x="68" y="38" width="159" height="129" rx="5" fill="#0f0f1e"/>
  <!-- panel label -->
  <rect x="80" y="46" width="135" height="18" rx="3" fill="#1e2040"/>
  <text x="147" y="58" font-family="Arial" font-size="8" fill="#8899bb" text-anchor="middle" font-weight="bold">SEPTIC CONTROL PANEL</text>
  <!-- RED ALARM LIGHT - the hero element -->
  <circle cx="148" cy="85" r="22" fill="#1a0000" stroke="#cc1100" stroke-width="2"/>
  <circle cx="148" cy="85" r="16" fill="#ff2200" opacity="0.9"/>
  <circle cx="148" cy="85" r="10" fill="#ff6644" opacity="0.9"/>
  <circle cx="143" cy="80" r="4" fill="white" opacity="0.35"/>
  <!-- pulsing rings -->
  <circle cx="148" cy="85" r="26" fill="none" stroke="#ff2200" stroke-width="1.5" opacity="0.5"/>
  <circle cx="148" cy="85" r="32" fill="none" stroke="#ff2200" stroke-width="1" opacity="0.25"/>
  <!-- ALARM label under light -->
  <text x="148" y="116" font-family="Arial" font-size="8" fill="#ff4422" text-anchor="middle" font-weight="bold">ALARM</text>
  <!-- breaker switches -->
  <rect x="82" y="122" width="28" height="36" rx="3" fill="#111827" stroke="#334" stroke-width="1"/>
  <rect x="86" y="127" width="20" height="8" rx="2" fill="#22c55e"/>
  <text x="96" y="149" font-family="Arial" font-size="6" fill="#6b7280" text-anchor="middle">PUMP</text>
  <text x="96" y="156" font-family="Arial" font-size="6" fill="#6b7280" text-anchor="middle">CB1</text>
  <rect x="116" y="122" width="28" height="36" rx="3" fill="#111827" stroke="#334" stroke-width="1"/>
  <rect x="120" y="127" width="20" height="8" rx="2" fill="#d81f2a"/>
  <text x="130" y="149" font-family="Arial" font-size="6" fill="#6b7280" text-anchor="middle">ALRM</text>
  <text x="130" y="156" font-family="Arial" font-size="6" fill="#6b7280" text-anchor="middle">CB2</text>
  <!-- wiring lines -->
  <line x1="148" y1="107" x2="148" y2="122" stroke="#ff2200" stroke-width="1.5" opacity="0.5"/>
  <line x1="148" y1="122" x2="130" y2="122" stroke="#ff2200" stroke-width="1.5" opacity="0.5"/>
  <!-- right side text -->
  <text x="295" y="55" font-family="Arial" font-size="16" fill="white" text-anchor="middle" font-weight="900" opacity="0.95">PUMP</text>
  <text x="295" y="75" font-family="Arial" font-size="16" fill="#ff2200" text-anchor="middle" font-weight="900">ALARM</text>
  <text x="295" y="92" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="700">GOING OFF?</text>
  <line x1="248" y1="105" x2="352" y2="105" stroke="#333" stroke-width="1"/>
  <text x="295" y="122" font-family="Arial" font-size="9" fill="#9ca3af" text-anchor="middle">Red light · Buzzer · Backup risk</text>
  <text x="295" y="138" font-family="Arial" font-size="9" fill="#9ca3af" text-anchor="middle">Call us immediately</text>
  <!-- emergency badge -->
  <rect x="248" y="152" width="94" height="22" rx="11" fill="#d81f2a"/>
  <text x="295" y="167" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">🔴 EMERGENCY</text>
</svg>