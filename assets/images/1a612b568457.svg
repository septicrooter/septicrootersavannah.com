<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" width="1600" height="700">
  <defs>
    <!-- Sky gradient: bright blue day -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="55%" stop-color="#7ab8f5"/>
      <stop offset="100%" stop-color="#b8d9f8"/>
    </linearGradient>
    <!-- Ground gradient: lush green lawn -->
    <linearGradient id="lawn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8c2a"/>
      <stop offset="100%" stop-color="#2d5c18"/>
    </linearGradient>
    <!-- House wall -->
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0e8d8"/>
      <stop offset="100%" stop-color="#d9ccb5"/>
    </linearGradient>
    <!-- Roof -->
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b3a2a"/>
      <stop offset="100%" stop-color="#4a2518"/>
    </linearGradient>
    <!-- Driveway -->
    <linearGradient id="drive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0a898"/>
      <stop offset="100%" stop-color="#8a8278"/>
    </linearGradient>
    <!-- Tree foliage -->
    <radialGradient id="foliage1" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#5aab2e"/>
      <stop offset="100%" stop-color="#2d6b10"/>
    </radialGradient>
    <radialGradient id="foliage2" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4ea828"/>
      <stop offset="100%" stop-color="#286010"/>
    </radialGradient>
    <!-- Sun glow -->
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7a0"/>
      <stop offset="40%" stop-color="#ffe066" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffe066" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow under eaves -->
    <linearGradient id="eaveshad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0.25)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="blur6"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="blur12"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="treeshad"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <!-- SKY -->
